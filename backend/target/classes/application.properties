spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/Problem2Product?createDatabaseIfNotExist=true
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.username=${DB_USER}
spring.datasource.password=${SQL_PASS}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-1234567890}
jwt.expiration=86400000
